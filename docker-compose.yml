name: ${PROJECT_NAME}

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME}
      MARIADB_USER: ${WORDPRESS_DB_USER}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - internal

  wordpress:
    image: wordpress:php8.2-apache
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WP_HOME: https://${SUBDOMAIN}.${ROOT_DOMAIN}
      WP_SITEURL: https://${SUBDOMAIN}.${ROOT_DOMAIN}
      FORCE_SSL_ADMIN: "true"
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && stripos($$_SERVER['HTTP_X_FORWARDED_PROTO'], 'https') !== false) {
            $$_SERVER['HTTPS'] = 'on';
            $$_SERVER['SERVER_PORT'] = 443;
        }

        define('WP_HOME', getenv('WP_HOME'));
        define('WP_SITEURL', getenv('WP_SITEURL'));
        define('FORCE_SSL_ADMIN', filter_var(getenv('FORCE_SSL_ADMIN'), FILTER_VALIDATE_BOOLEAN));
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - wordpress
    environment:
      DOMAIN_NAME: ${SUBDOMAIN}.${ROOT_DOMAIN}
    command:
      - /bin/sh
      - -c
      - envsubst '$$DOMAIN_NAME' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && while :; do sleep 6h & wait $$!; nginx -s reload; done & exec nginx -g 'daemon off;'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - nginx_certs:/etc/letsencrypt
      - nginx_webroot:/var/www/certbot
    networks:
      - edge
      - internal

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      - nginx
    entrypoint:
      - /bin/sh
      - -c
    command:
      - trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet || true; sleep 12h & wait $$!; done
    volumes:
      - nginx_certs:/etc/letsencrypt
      - nginx_webroot:/var/www/certbot
    networks:
      - edge

networks:
  edge:
    name: ${PROJECT_NAME}_edge
    driver: bridge
  internal:
    name: ${PROJECT_NAME}_internal
    driver: bridge
    internal: true

volumes:
  wordpress_data:
    name: ${PROJECT_NAME}_wordpress_data
  mariadb_data:
    name: ${PROJECT_NAME}_mariadb_data
  nginx_certs:
    name: ${PROJECT_NAME}_nginx_certs
  nginx_webroot:
    name: ${PROJECT_NAME}_nginx_webroot
